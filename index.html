<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Amruta Yadav | Portfolio</title>
    <meta
      name="description"
      content="Portfolio of Amruta Yadav, software developer building accessible and high-performance web experiences."
    />
    <script>
      (() => {
        const key = "portfolio-theme";
        try {
          const saved = localStorage.getItem(key);
          const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
          const theme =
            saved === "dark" || saved === "light" ? saved : prefersDark ? "dark" : "light";
          document.documentElement.setAttribute("data-theme", theme);
        } catch (error) {
          document.documentElement.setAttribute("data-theme", "light");
        }
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
